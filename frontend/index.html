<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cup O'Aroma — Coffee &amp; Pastries</title>
  <meta name="description" content="Cup O'Aroma — soft mornings, hand-pulled espresso and pastries baked fresh daily in Lahug, Cebu City." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="landing">
  <header class="navbar landing-nav">
    <div class="nav-inner">
      <span class="logo">
        <span class="logo-cup">☕</span>
        <span class="logo-text">Cup&nbsp;O'Aroma</span>
      </span>
      <div class="nav-right">
        <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
      </div>
    </div>
  </header>

  <main class="landing-wrap">
    <section class="landing-hero">
      <div class="landing-bg" aria-hidden="true"></div>

      <div class="landing-card">
        <!-- Brand mark (inline SVG so it always renders, no MIME dependency) -->
        <div class="brand-mark" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="92" height="92">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#FCE4EE"/><stop offset="1" stop-color="#E4F5EA"/>
              </linearGradient>
              <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#F8C8DC"/><stop offset="1" stop-color="#CDEBD6"/>
              </linearGradient>
            </defs>
            <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#E7B7C8" stroke-width="2"/>
            <path d="M20 26 h20 v10 a10 10 0 0 1 -10 10 h0 a10 10 0 0 1 -10 -10 z" fill="url(#cup)" stroke="#6F4E37" stroke-width="2"/>
            <path d="M40 28 h4 a5 5 0 0 1 0 10 h-2" fill="none" stroke="#6F4E37" stroke-width="2" stroke-linecap="round"/>
            <path d="M27 18 q-3 -4 0 -8 M33 18 q3 -4 0 -8" fill="none" stroke="#F8C8DC" stroke-width="2.4" stroke-linecap="round"/>
            <ellipse cx="30" cy="26" rx="10" ry="2.6" fill="#FFF8F1" stroke="#6F4E37" stroke-width="1.6"/>
          </svg>
        </div>
        <span class="kicker">Coffee · Pastries · Cebu</span>
        <h1 class="brand-name">Cup&nbsp;O'Aroma</h1>
        <p class="brand-tag">Warm cups &amp; sweet little things.<br/>Sign in to start your order.</p>

        <!-- Auth block (shown when not yet signed in) -->
        <div id="authBlock" class="auth-block">
          <button class="auth-btn auth-google" data-auth="Google" type="button">
            <span class="auth-ico" aria-hidden="true">
              <svg viewBox="0 0 48 48" width="22" height="22"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.9 6.1C12.3 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7c4.3-3.9 6.8-9.7 6.8-17.4z"/><path fill="#FBBC05" d="M10.5 28.3c-.5-1.4-.8-2.9-.8-4.3s.3-2.9.8-4.3l-7.9-6.1C1 16.2 0 19.9 0 24s1 7.8 2.6 11.4l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.3-5.7c-2 1.4-4.7 2.3-8.2 2.3-6.4 0-11.7-3.7-13.5-9.1l-7.9 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
            </span>
            Continue with Google
          </button>

        </div>

        <!-- Signed-in quick re-entry (shown when gate already open this session) -->
        <div id="signedIn" class="signed-in" style="display:none;">
          <p class="signed-msg">You're signed in. Welcome back 🌸</p>
          <button class="btn btn-solid btn-block" id="enterShop" type="button" onclick="location.replace('shop.html')">Enter the Café</button>
        </div>

        <p class="landing-fine">By continuing you agree to our cozy Terms &amp; warm Cookies.</p>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="landing.js"></script>
</body>
</html>
